spring.application.name=eschool

# 1. Database Connection URL (Change 'school_cloud_db' if you named it differently)
spring.datasource.url=jdbc:mysql://localhost:3306/school_cloud_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# 2. MySQL Credentials
spring.datasource.username=root
spring.datasource.password=root

# 3. Driver Class Name
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Hibernate Settings
# 'update' will automatically create/update your tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 5. Server Port (Optional: Change if 8080 is busy)
server.port=9090